# Read the Docs configuration file for Sphinx projects
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    # 安装依赖
    - pip install -r requirements.txt
    
    # 构建中文版 (默认)
    - python -m sphinx -T -b html -d _build/doctrees -D language=zh_CN source $READTHEDOCS_OUTPUT/html
    
    # 构建英文版
    - python -m sphinx -T -b html -d _build/doctrees -D language=en source $READTHEDOCS_OUTPUT/html/en

# Build documentation in the "source/" directory with Sphinx
sphinx:
  configuration: source/conf.py

# Optional but recommended, declare the Python requirements required
# to build your documentation
python:
  install:
    - requirements: requirements.txt
